<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Anton|Google Sans Flex">
<title>Portfolio</title>

<style>
#load-trigger {
  height: 1px;
}

body {
  margin: 0;
  background: #080806;
  color: #e5e7ec;
}

header {
  position: sticky;
  top: 0;
  padding: 20px 20px 8px;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
  font-size: 1.35rem;
  font-family: "Anton", sans-serif;
}

header a {
  color: #e5e7eb;
  font-size: 1.05rem;
  font-family: "Google Sans Flex", sans-serif;
  text-decoration: none;
  display: flex;
  margin-top: 7px;
  transition: color 0.7s ease;
}

header a:hover {
  color: #a5a7ab;
}

.gallery {
  column-width: 260px;
  column-gap: 12px;
  padding: 12px;
  max-width: 1400px;
  margin: auto;
}

.item {
  display: inline-block;
  width: 100%;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

.item:hover {
  z-index: 999;
}

/* keep elevated during exit transition */
.item {
  display: inline-block;
  width: 100%;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
  transition: z-index 0s linear 0.35s; /* delay dropping z-index */
}

.item:hover {
  z-index: 999;
  transition-delay: 0s;
}

.item img {
  width: 100%;
  height: auto;
  display: block;
  transform-origin: center center;
  will-change: transform;
  transition: transform 0.35s ease-out;
  backface-visibility: hidden;
}

/* prevent ghosting by keeping same element scaling smoothly */
.item:hover img {
  transform: scale(1.35);
}

@media (min-width: 1400px) {
  .gallery {
    column-width: 320px;
    max-width: 1800px;
  }

  .item:hover img {
    transform: scale(2);
  }
}

@media (min-width: 1800px) {
  .gallery {
    column-width: 380px;
    max-width: 2200px;
  }

  .item:hover img {
    transform: scale(3.2);
  }
}

.item img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.4s ease;
}

/* smooth ambient dim layer */
.item::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.0);
  transition: background 0.4s ease;
  pointer-events: none;
}

/* subtle zoom only on hovered image */
.item:hover img {
  transform: scale(1.25);
}

/* smooth fade across entire gallery */
.gallery:hover .item::after {
  background: rgba(0,0,0,0.5);
}

/* remove dim on hovered item */
.gallery .item:hover::after {
  background: rgba(0,0,0,0.0);
}

</style>
</head>

<body>

<header>
  <div style="text-transform: uppercase">Jedy Sukandra</div>
  <div><a href="mailto:film@jedy.cc" target="_blank" rel="noopener noreferrer">film@jedy.cc</a></div>
</header>

<main class="gallery" id="gallery"></main>
<div id="load-trigger"></div>

<script>
let allFiles = [];
let loadedCount = 0;

const initialBatchSize = 30;
const batchSize = 18;

const gallery = document.getElementById('gallery');
const trigger = document.getElementById('load-trigger');

function addImages(count) {
  const slice = allFiles.slice(loadedCount, loadedCount + count);

  slice.forEach(file => {
    const div = document.createElement('div');
    div.className = 'item';

    const img = document.createElement('img');
    img.src = `/api/image?name=${encodeURIComponent(file)}`;
    img.loading = 'lazy';
    img.decoding = 'async';

    div.appendChild(img);
    gallery.appendChild(div);
  });

  loadedCount += slice.length;

  if (loadedCount >= allFiles.length) {
    observer.disconnect();
    trigger.remove();
  }
}

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) {
    addImages(batchSize);
  }
}, {
  rootMargin: '800px'
});

fetch('/api/list-images')
  .then(res => res.json())
  .then(files => {
    allFiles = files;

    // load enough immediately so page doesn't feel empty
    addImages(initialBatchSize);

    observer.observe(trigger);
  });
</script>

</body>
</html>
