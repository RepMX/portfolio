<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Anton|Google Sans Flex">
<title>Portfolio</title>

<style>
html, body {
  overflow-x: hidden;
}

#load-trigger {
  height: 1px;
}

body {
  margin: 0;
  background: #080806;
  color: #e6e8ed;
}

header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  box-sizing: border-box;
  padding: 20px 20px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1001;
  font-size: 1.35rem;
  font-family: "Anton", sans-serif;
  text-shadow: 
    0px 1px 1px rgb(0 0 0 / 0.1), 
    0px 1px 2px rgb(0 0 0 / 0.1), 
    0px 2px 2px rgb(0 0 0 / 0.1);
}

header a {
  color: #e6e8ed;
  font-size: 1.05rem;
  font-family: "Google Sans Flex", sans-serif;
  text-decoration: none;
  display: flex;
  transition: color 0.7s ease;
}

header a:hover {
  color: #e2e4e8;
}

.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  box-sizing: border-box;
  padding: 8px 20px 20px;
  display: flex;
  justify-content: center;
  width: 100%;
  text-align: center;
  font-family: "Google Sans Flex", sans-serif;
  font-size: 0.8rem;
  color: #e2e4e8;
  pointer-events: none; /* so it doesn’t block clicks */
  z-index: 1000;
}

.gallery {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px;
  margin: auto;
  margin-top: 26px;
}

.masonry-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.item {
  display: inline-block;
  width: 100%;
  position: relative;
  z-index: 1;
}

.item:hover {
  z-index: 999;
}

/* keep elevated during exit transition */
.item {
  display: inline-block;
  width: 100%;
  position: relative;
  z-index: 1;
  transition: z-index 0s linear 0.35s; /* delay dropping z-index */
}

.item:hover {
  z-index: 999;
  transition-delay: 0s;
}

.item img {
  width: 100%;
  height: auto;
  display: block;
  opacity: 0;
  transform-origin: center center;
  will-change: transform, opacity;
  backface-visibility: hidden;
  transition:
    transform 0.4s ease,
    opacity 0.3s ease;
}

.item img.loaded {
  opacity: 1;
}

:root {
  --hover-zoom: 1.25;
}

.item:hover img {
  transform: scale(var(--hover-zoom));
}

@media (min-width: 1400px) {
  :root {
    --hover-zoom: 1.7;
  }
}

@media (min-width: 1800px) {
  :root {
    --hover-zoom: 2.0;
  }
}

@media (min-width: 2100px) {
  :root {
    --hover-zoom: 2.5;
  }
  header {
    max-width: 2124px;
    left: 50%;
    right: auto;
    width: 100%;
    transform: translateX(-50%);
  }
  .gallery {
    max-width: 2100px;
  }
}

/* smooth ambient dim layer */
.item::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.0);
  transition: background 0.4s ease;
  pointer-events: none;
}


/* smooth fade across entire gallery */
.gallery:hover .item::after {
  background: rgba(0,0,0,0.5);
}

/* remove dim on hovered item */
.gallery .item:hover::after {
  background: rgba(0,0,0,0.0);
}

.top-fade {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;
  pointer-events: none;
  z-index: 1000;

  /* gradient fade */
  background: linear-gradient(
    to top,
    rgba(8,8,6,0) 0%,
    rgba(8,8,6,0.1) 40%,
    rgba(8,8,6,0.3) 70%,
    rgba(8,8,6,0.6) 100%
  );

}

.bottom-fade {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30%;
  pointer-events: none;
  z-index: 900;

  /* gradient fade */
  background: linear-gradient(
    to bottom,
    rgba(8,8,6,0) 0%,
    rgba(8,8,6,0.3) 40%,
    rgba(8,8,6,0.6) 70%,
    rgba(8,8,6,0.95) 100%
  );

}

</style>
</head>

<body>

<header>
  <div style="text-transform: uppercase">Jedy Sukandra</div>
  <div><a href="mailto:film@jedy.cc" target="_blank" rel="noopener noreferrer">film@jedy.cc</a></div>
</header>

<div class="top-fade"></div>

<main class="gallery" id="gallery"></main>
<div id="load-trigger"></div>

<div class="bottom-fade"></div>

<footer class="footer">
  <span>© <span id="year"></span> Jedy Sukandra | all rights reserved</span>
</footer>

<script>
let allFiles = [];
let renderedFiles = [];
let loadedCount = 0;
let columns = [];
let isLoading = false;

const initialBatchSize = 20;
const batchSize = 10;
const minColumnWidth = 320;
const preloadDistance = 300;

const gallery = document.getElementById('gallery');
const trigger = document.getElementById('load-trigger');

const yearEl = document.getElementById('year');

if (yearEl) {
  yearEl.textContent = new Date().getFullYear();
}

function getColumnCount() {
  return Math.max(1, Math.floor(gallery.clientWidth / minColumnWidth));
}

function buildColumns() {
  gallery.innerHTML = '';
  columns = [];

  const count = getColumnCount();

  for (let i = 0; i < count; i++) {
    const col = document.createElement('div');
    col.className = 'masonry-column';
    gallery.appendChild(col);
    columns.push(col);
  }
}

function getShortestColumn() {
  return columns.reduce((shortest, col) =>
    col.offsetHeight < shortest.offsetHeight ? col : shortest
  , columns[0]);
}

function createImageItem(file) {
  const div = document.createElement('div');
  div.className = 'item';

  const img = document.createElement('img');
  img.src = `/api/image?name=${encodeURIComponent(file)}`;
  img.loading = 'lazy';
  img.decoding = 'async';

  img.onload = () => img.classList.add('loaded');
  img.onerror = () => img.classList.add('loaded');

  div.appendChild(img);
  return div;
}

function renderFiles(files) {
  files.forEach(file => {
    const item = createImageItem(file);
    getShortestColumn().appendChild(item);
  });
}

async function loadMore(count) {
  if (isLoading || loadedCount >= allFiles.length) return;

  isLoading = true;
  observer.unobserve(trigger);

  const nextFiles = allFiles.slice(loadedCount, loadedCount + count);

  loadedCount += nextFiles.length;
  renderedFiles.push(...nextFiles);

  renderFiles(nextFiles);

  isLoading = false;

  if (loadedCount >= allFiles.length) {
    observer.disconnect();
    trigger.remove();
  } else {
    observer.observe(trigger);
  }
}

function rebuildMasonry() {
  buildColumns();
  renderFiles(renderedFiles);
}

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) {
    loadMore(batchSize);
  }
}, {
  rootMargin: `${preloadDistance}px`
});

function shuffle(array) {
  const shuffled = [...array];

  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  return shuffled;
}

fetch('/api/list-images')
  .then(res => res.json())
  .then(files => {
    allFiles = shuffle(files);
    // allFiles = files.sort().reverse();
    buildColumns();
    loadMore(initialBatchSize);

    if (loadedCount < allFiles.length) {
      observer.observe(trigger);
    }
  });

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);

  resizeTimer = setTimeout(() => {
    rebuildMasonry();
  }, 200);
});

</script>

</body>
</html>
